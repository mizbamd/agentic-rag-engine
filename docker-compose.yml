name: agentic-rag-engine

services:
  # pgvector is wired in for the production VectorStore adapter. The default in-memory store
  # needs no infra; this service is here to demonstrate the persistent-vector deployment shape.
  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: discovery
      POSTGRES_USER: discovery
      POSTGRES_PASSWORD: discovery
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discovery"]
      interval: 5s
      timeout: 5s
      retries: 20

  agentic-rag-engine:
    build:
      context: .
    environment:
      CORPUS_DIR: /app/data/corpus
      PGVECTOR_URL: postgresql://discovery:discovery@pgvector:5432/discovery
    ports:
      - "8000:8000"
    depends_on:
      pgvector:
        condition: service_healthy
